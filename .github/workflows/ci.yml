name: CI

on:
  push:
    branches: [main]
  pull_request:

# Pinned toolchain mirrors the source-of-truth files: Go via server/go.mod,
# Python 3.12, Postgres 16.4 (matching docker-compose.yml), Godot 4.6.3.
jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.4
        env:
          POSTGRES_USER: arpg
          POSTGRES_PASSWORD: arpg
          POSTGRES_DB: arpg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arpg -d arpg"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    env:
      ARPG_DATABASE_URL: postgres://arpg:arpg@localhost:5432/arpg?sslmode=disable
      ARPG_ADDR: ":8080"
      ARPG_DEV_TOKEN: local-dev-token
      ARPG_DEBUG_TOKEN: local-debug-token
      BASE_URL: http://localhost:8080

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tooling
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Validate shared contracts
        run: .venv/bin/python tools/validate_shared.py

      - name: Go tests
        run: cd server && go test ./...

      - name: Python unit tests
        run: .venv/bin/python -m pytest -q tools

      - name: End-to-end (server + bot + replay)
        env:
          ARPG_RULES_DIR: ${{ github.workspace }}/shared/rules
        run: |
          set -euo pipefail
          (cd server && go build -o "$RUNNER_TEMP/arpg-server" ./cmd/arpg-server)
          (cd server && go build -o "$RUNNER_TEMP/arpg-replay" ./cmd/arpg-replay)
          "$RUNNER_TEMP/arpg-server" &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          for i in $(seq 1 60); do curl -fsS "$BASE_URL/readyz" >/dev/null 2>&1 && break; sleep 1; done
          curl -fsS "$BASE_URL/readyz"
          SESSION_ID=$(.venv/bin/python -m tools.bot.run \
            --base-url "$BASE_URL" --dev-token "$ARPG_DEV_TOKEN" --debug-token "$ARPG_DEBUG_TOKEN" \
            --print-session-id)
          echo "bot completed session $SESSION_ID"
          "$RUNNER_TEMP/arpg-replay" --session-id "$SESSION_ID"

      # Godot headless smoke. The runner may not be able to provision the pinned
      # Godot build; this step is best-effort and non-blocking (client_smoke.sh
      # also self-skips when Godot is absent). See README / as-built notes: the
      # client smoke is a local requirement until a Godot runner image is fixed.
      - name: Godot headless smoke (best-effort)
        continue-on-error: true
        env:
          ARPG_RULES_DIR: ${{ github.workspace }}/shared/rules
        run: |
          set -euo pipefail
          GODOT_VER="$(cat .godot-version)"            # e.g. 4.6.3-stable
          ZIP="Godot_v${GODOT_VER}_linux.x86_64.zip"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VER}/${ZIP}"
          if curl -fsSL "$URL" -o "$RUNNER_TEMP/godot.zip"; then
            unzip -q "$RUNNER_TEMP/godot.zip" -d "$RUNNER_TEMP/godot"
            GODOT_BIN="$(find "$RUNNER_TEMP/godot" -maxdepth 1 -type f -name 'Godot_*' | head -1)"
            chmod +x "$GODOT_BIN"
            (cd server && ARPG_RULES_DIR="$GITHUB_WORKSPACE/shared/rules" go run ./cmd/arpg-server &)
            for i in $(seq 1 60); do curl -fsS "$BASE_URL/readyz" >/dev/null 2>&1 && break; sleep 1; done
            GODOT="$GODOT_BIN" BASE_URL="$BASE_URL" DEV_TOKEN="$ARPG_DEV_TOKEN" DEBUG_TOKEN="$ARPG_DEBUG_TOKEN" \
              ./scripts/client_smoke.sh
          else
            echo "Could not download Godot ${GODOT_VER}; skipping client smoke (run 'make client-smoke' locally)."
          fi
